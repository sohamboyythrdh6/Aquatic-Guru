<!DOCTYPE html>
<html>
<head>
<title>Aquatic Guru</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Buy guppies and aquarium plants online in India. Aquatic Guru offers premium fish like 24K gold guppies and plants with delivery.">
<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
.section { margin:20px; padding:20px; background:#1e293b; border-radius:10px; }
.card { background:#334155; padding:15px; margin:10px; border-radius:10px; }
button { padding:8px; margin:5px; border:none; border-radius:5px; cursor:pointer; }
.add { background:#38bdf8; color:white; }
.checkout { background:#22c55e; color:white; }

#cartBtn {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #22c55e;
  border-radius: 50%;
  font-size:18px;
}

#cartPopup {
  display:none;
  position: fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:20px;
  border-radius:10px;
  width:300px;
}
</style>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let delivery = 0;

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(name, price, type) {
  let found = cart.find(item => item.name === name);

  if(found){
    found.qty += 1;
  } else {
    cart.push({name, price, type, qty: 1});
  }

  saveCart();
  alert(name + " added");
}

// CHANGE QUANTITY
function changeQty(name, change){
  let item = cart.find(i => i.name === name);
  if(item){
    item.qty += change;
    if(item.qty <= 0){
      cart = cart.filter(i => i.name !== name);
    }
    saveCart();
    updateCart();
  }
}

// CLEAR CART
function clearCart(){
  cart = [];
  saveCart();
  updateCart();
}

// OPEN CART
function openCart(){
  document.getElementById("cartPopup").style.display="block";
  updateCart();
}

// CLOSE CART
function closeCart(){
  document.getElementById("cartPopup").style.display="none";
}

// DELIVERY CALCULATION
function calculateDelivery(){
  let pin = document.getElementById("pincode").value;

  if(pin.length !== 6){
    delivery = 0;
    updateCart();
    return;
  }

  let fishCount = 0;

  cart.forEach(item=>{
    if(item.type === "fish") fishCount += item.qty;
  });

  let box = "Small";

  if(fishCount > 20){
    box = "Large";
  }
  else if(fishCount > 8){
    box = "Medium";
  }

  let weightCharge = 0;
  if(box === "Small") weightCharge = 60;
  if(box === "Medium") weightCharge = 120;
  if(box === "Large") weightCharge = 200;

  let base = 0;

  if(pin === "721152"){
    base = 40;
  }
  else if(pin.substring(0,3) === "721"){
    base = 80;
  }
  else if(pin.startsWith("7")){
    base = 130;
  }
  else{
    base = 220;
  }

  delivery = base + weightCharge;

  document.getElementById("boxInfo").innerText = "Box: " + box;

  updateCart();
}

// UPDATE CART
function updateCart(){
  let list = document.getElementById("cartItems");
  list.innerHTML="";
  let total=0;

  cart.forEach(item=>{
    list.innerHTML += item.name + " x" + item.qty + 
    " ₹" + (item.price * item.qty) +
    " <button onclick=\"changeQty('" + item.name + "',1)\">+</button>" +
    " <button onclick=\"changeQty('" + item.name + "',-1)\">-</button><br>";
    total += item.price * item.qty;
  });

  document.getElementById("subtotal").innerText="Subtotal: ₹"+total;
  document.getElementById("delivery").innerText="Delivery: ₹"+delivery;
  document.getElementById("total").innerText="Total: ₹"+(total+delivery);
}

// CHECKOUT
function checkout(){
  let pin = document.getElementById("pincode").value;

  if(pin.length !== 6){
    alert("Enter pincode first");
    return;
  }

  let msg="Hello Aquatic Guru,%0AI want to order:%0A%0A";
  let total=0;

  cart.forEach(item=>{
    msg+=item.name + " x" + item.qty + " - ₹" + (item.price * item.qty) + "%0A";
    total+=item.price * item.qty;
  });

  msg+="%0A" + document.getElementById("boxInfo").innerText;
  msg+="%0ADelivery: ₹"+delivery;
  msg+="%0ATotal: ₹"+(total+delivery);
  msg+="%0A%0APincode: "+pin;
  msg+="%0AMy Name:%0AMy Address:%0AShare Location:";

  window.open("https://wa.me/919475855619?text="+msg,"_blank");
}

window.onload = function(){
  updateCart();
}
</script>

</head>

<body>

<div style="text-align:center;">
  <img src="IMG_20260323_210115.jpg" alt="Aquatic Guru Logo" style="width:120px; border-radius:50%;">
  <h1>Aquatic Guru</h1>
</div>
<p>Premium Fish & Aquarium Plants</p>

<button id="cartBtn" onclick="openCart()">🛒</button>

<div id="cartPopup">
<h3>Cart</h3>

<div id="cartItems"></div>

<input type="number" id="pincode" placeholder="Enter Pincode" oninput="calculateDelivery()"><br><br>

<p id="boxInfo">Box: -</p>
<p id="subtotal">Subtotal: ₹0</p>
<p id="delivery">Delivery: ₹0</p>
<p id="total">Total: ₹0</p>

<button class="checkout" onclick="checkout()">Order</button>
<button onclick="clearCart()">Clear Cart</button>
<button onclick="closeCart()">Close</button>
</div>

<div class="section">
<h2>🌿 Plants</h2>

<div class="card">
<h3>Hygrophila Difformis</h3>
<p>₹50</p>
<button class="add" onclick="addToCart('Hygrophila Difformis',50,'plant')">Add to Cart</button>
</div>

<div class="card">
<h3>Limnophila Aquatica</h3>
<p>₹60</p>
<button class="add" onclick="addToCart('Limnophila Aquatica',60,'plant')">Add to Cart</button>
</div>

</div>

<div class="section">
<h2>🐟 Guppies</h2>

<div class="card">
<h3>24K Gold Dumbo Ear Guppy</h3>
<p>₹400 (pair)</p>
<button class="add" onclick="addToCart('24K Gold Dumbo Ear Guppy',400,'fish')">Add to Cart</button>
</div>

<div class="card">
<h3>Platinum Red Tail Dumbo Ear Guppy</h3>
<p>₹350 (pair)</p>
<button class="add" onclick="addToCart('Platinum Red Tail Dumbo Ear Guppy',350,'fish')">Add to Cart</button>
</div>

</div>

</body>
</html>
