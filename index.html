<!DOCTYPE html>
<html>
<head>
<title>Aquatic Guru</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
.section { margin:20px; padding:20px; background:#1e293b; border-radius:10px; }
.card { background:#334155; padding:15px; margin:10px; border-radius:10px; }
button { padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer; }
.add { background:#38bdf8; color:white; }
.checkout { background:#22c55e; color:white; }
img { width:200px; border-radius:10px; }

#cart {
  position: fixed;
  right: 10px;
  top: 10px;
  background: #111;
  padding: 15px;
  border-radius: 10px;
}
</style>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  alert(name + " added to cart");
  updateCart();
}

function updateCart() {
  let cartDiv = document.getElementById("cartItems");
  cartDiv.innerHTML = "";
  let total = 0;

  cart.forEach(item => {
    cartDiv.innerHTML += item.name + " - ₹" + item.price + "<br>";
    total += item.price;
  });

  document.getElementById("total").innerText = "Total: ₹" + total;
}

function checkout() {
  if(cart.length === 0){
    alert("Cart is empty");
    return;
  }

  let message = "Hello Aquatic Guru,%0AI want to order:%0A%0A";
  let total = 0;

  cart.forEach(item => {
    message += item.name + " - ₹" + item.price + "%0A";
    total += item.price;
  });

  message += "%0ATotal: ₹" + total + "%0A%0AMy Name:%0AMy Address:%0AMy Pincode:";

  window.open("https://wa.me/919475855619?text=" + message, "_blank");
}
</script>

</head>

<body>

<h1>🐠 Aquatic Guru</h1>

<!-- CART BOX -->
<div id="cart">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>
<p id="total">Total: ₹0</p>
<button class="checkout" onclick="checkout()">Order on WhatsApp</button>
</div>

<!-- PLANTS -->
<div class="section">
<h2>🌿 Plants</h2>

<div class="card">
<h3>Hygrophila Difformis</h3>
<p>₹50</p>
<button class="add" onclick="addToCart('Hygrophila Difformis',50)">Add to Cart</button>
</div>

<div class="card">
<h3>Limnophila Aquatica</h3>
<p>₹60</p>
<button class="add" onclick="addToCart('Limnophila Aquatica',60)">Add to Cart</button>
</div>

</div>

<!-- GUPPIES -->
<div class="section">
<h2>🐟 Guppies</h2>

<div class="card">
<h3>24K Gold Dumbo Ear</h3>
<p>₹400 (pair)</p>
<button class="add" onclick="addToCart('24K Gold Dumbo Ear Guppy',400)">Add to Cart</button>
</div>

<div class="card">
<h3>Platinum Red Tail Dumbo</h3>
<p>₹350 (pair)</p>
<button class="add" onclick="addToCart('Platinum Red Tail Dumbo Ear Guppy',350)">Add to Cart</button>
</div>

</div>

</body>
</html>
