<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let delivery = 0;

const sellerPin = "721152";

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(name, price) {
  cart.push({name, price});
  saveCart();
  alert(name + " added to cart");
}

function clearCart(){
  cart = [];
  saveCart();
  updateCart();
}

function openCart(){
  document.getElementById("cartPopup").style.display="block";
  updateCart();
}

function closeCart(){
  document.getElementById("cartPopup").style.display="none";
}

function updateCart(){
  let list = document.getElementById("cartItems");
  list.innerHTML="";
  let total=0;

  cart.forEach(item=>{
    list.innerHTML += item.name+" - ₹"+item.price+"<br>";
    total+=item.price;
  });

  document.getElementById("subtotal").innerText="Subtotal: ₹"+total;
  document.getElementById("delivery").innerText="Delivery: ₹"+delivery;
  document.getElementById("total").innerText="Total: ₹"+(total+delivery);
}

function calculateDelivery(){
  let pin = document.getElementById("pincode").value;

  if(pin.length !== 6){
    alert("Enter valid pincode");
    return;
  }

  // SAME AREA (exact match)
  if(pin === sellerPin){
    delivery = 40;
  }
  // SAME DISTRICT (first 3 digits match)
  else if(pin.substring(0,3) === sellerPin.substring(0,3)){
    delivery = 70;
  }
  // SAME STATE (West Bengal usually starts with 7)
  else if(pin.startsWith("7")){
    delivery = 120;
  }
  // OTHER STATES
  else{
    delivery = 200;
  }

  updateCart();
}

function checkout(){
  let pin = document.getElementById("pincode").value;

  if(pin.length !== 6){
    alert("Enter pincode first");
    return;
  }

  let msg="Hello Aquatic Guru,%0AI want to order:%0A%0A";
  let total=0;

  cart.forEach(item=>{
    msg += item.name+" - ₹"+item.price+"%0A";
    total += item.price;
  });

  msg += "%0ADelivery: ₹"+delivery;
  msg += "%0ATotal: ₹"+(total+delivery);
  msg += "%0A%0APincode: "+pin;
  msg += "%0AMy Name:%0AMy Address:%0AShare Location:";

  window.open("https://wa.me/91XXXXXXXXXX?text="+msg,"_blank");
}

window.onload = function(){
  updateCart();
}
</script>
