<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let delivery = 0;

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(name, price, type) {
  cart.push({name, price, type});
  saveCart();
  alert(name + " added");
}

// CLEAR CART
function clearCart(){
  cart = [];
  saveCart();
  updateCart();
}

// OPEN / CLOSE CART
function openCart(){
  document.getElementById("cartPopup").style.display="block";
  updateCart();
}

function closeCart(){
  document.getElementById("cartPopup").style.display="none";
}

// AUTO CALCULATION
function calculateDelivery(){
  let pin = document.getElementById("pincode").value;

  if(pin.length !== 6){
    delivery = 0;
    updateCart();
    return;
  }

  let fishCount = 0;
  let plantCount = 0;

  // COUNT ITEMS
  cart.forEach(item=>{
    if(item.type === "fish") fishCount++;
    if(item.type === "plant") plantCount++;
  });

  // 🧠 AUTO BOX SIZE
  let box = "small";

  if(fishCount > 20){
    box = "large";
  }
  else if(fishCount > 8){
    box = "medium";
  }

  // 📦 WEIGHT BASED COST
  let weightCharge = 0;

  if(box === "small") weightCharge = 60;
  if(box === "medium") weightCharge = 120;
  if(box === "large") weightCharge = 200;

  // 📍 DISTANCE BASE COST
  let base = 0;

  if(pin === "721152"){
    base = 40;
  }
  else if(pin.substring(0,3) === "721"){
    base = 80;
  }
  else if(pin.startsWith("7")){
    base = 130;
  }
  else{
    base = 220;
  }

  delivery = base + weightCharge;

  // SHOW BOX TYPE
  document.getElementById("boxInfo").innerText = "Box: " + box;

  updateCart();
}

// UPDATE CART
function updateCart(){
  let list = document.getElementById("cartItems");
  list.innerHTML="";
  let total=0;

  cart.forEach(item=>{
    list.innerHTML += item.name+" - ₹"+item.price+"<br>";
    total+=item.price;
  });

  document.getElementById("subtotal").innerText="Subtotal: ₹"+total;
  document.getElementById("delivery").innerText="Delivery: ₹"+delivery;
  document.getElementById("total").innerText="Total: ₹"+(total+delivery);
}

// CHECKOUT
function checkout(){
  let pin = document.getElementById("pincode").value;

  if(pin.length !== 6){
    alert("Enter pincode first");
    return;
  }

  let msg="Hello Aquatic Guru,%0AI want to order:%0A%0A";
  let total=0;

  cart.forEach(item=>{
    msg+=item.name+" - ₹"+item.price+"%0A";
    total+=item.price;
  });

  msg+="%0ABox Type: "+document.getElementById("boxInfo").innerText;
  msg+="%0ADelivery: ₹"+delivery;
  msg+="%0ATotal: ₹"+(total+delivery);
  msg+="%0A%0APincode: "+pin;
  msg+="%0AMy Name:%0AMy Address:%0AShare Location:";

  window.open("https://wa.me/919475855619?text="+msg,"_blank");
}

window.onload = function(){
  updateCart();
}
</script>
